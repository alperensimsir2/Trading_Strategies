name: daily-signals

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run full backfill (first time or after long outage)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyarrow pandas_market_calendars
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: ticker-cache-${{ github.run_id }}
          restore-keys: |
            ticker-cache-
      - name: Check if market is open day
        id: market_day
        run: |
          python - <<EOF
          import datetime
          import pandas_market_calendars as mcal
          import os
          # Get the NYSE calendar
          nyse = mcal.get_calendar("NYSE")
          
          # Check a 24-hour window to account for the UTC date flip
          now = datetime.datetime.utcnow()
          yesterday = now - datetime.timedelta(days=1)
          
          # Check if either today or yesterday was a valid trading session
          schedule = nyse.schedule(start_date=yesterday.date(), end_date=now.date())
          
          is_open = "true" if not schedule.empty else "false"
          print(f"Market session active in window: {is_open}")
          
          # Write to GITHUB_ENV so the next steps can see it
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"MARKET_OPEN={is_open}\n")
          EOF
      - name: Run pipeline
        if: env.MARKET_OPEN == 'true'
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python -m src --backfill
          else
            python -m src
          fi
      - name: Upload artifact (debugging)
        if: env.MARKET_OPEN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_id }}
          path: out/
          retention-days: 7

      - name: Deploy to gh-pages
        if: env.MARKET_OPEN == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          keep_files: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Publish signals for ${{ github.run_id }}"
