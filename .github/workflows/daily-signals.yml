name: daily-signals

on:
  schedule:
    # 00:30 UTC Tue–Sat = ~3.5h after US market close in both EDT and EST.
    - cron: "30 0 * * 2-6"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run full backfill (first time or after long outage)"
        required: false
        default: "false"

# Permissions needed for the gh-pages deploy action to push to the gh-pages branch.
permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyarrow

      # Restore ticker history cache across runs. Daily key ensures we always
      # write a fresh entry; restore-keys fall back to yesterday's cache.
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: ticker-cache-${{ github.run_id }}
          restore-keys: |
            ticker-cache-

      - name: Run pipeline
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python -m src --backfill
          else
            python -m src
          fi

      - name: Upload artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_id }}
          path: out/
          retention-days: 7

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          keep_files: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Publish signals for ${{ github.run_id }}"